<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoddataX | Admin Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #EC1C24;
            --bg: #0f1014;
            --card: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text: #ffffff;
            --text-dim: #8a8a8e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Ambient Background */
        .ambient-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 80% 20%, rgba(236, 28, 36, 0.08) 0%, transparent 40%),
                        radial-gradient(circle at 20% 80%, rgba(236, 28, 36, 0.05) 0%, transparent 40%);
        }

        .navbar {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(10px);
            background: rgba(15, 16, 20, 0.8);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 800;
            font-size: 20px;
            letter-spacing: 1px;
        }

        .logo img { width: 32px; height: 32px; border-radius: 8px; }
        .logo span { color: var(--primary); }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 25px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: transform 0.3s;
        }

        .stat-card:hover { transform: translateY(-5px); border-color: rgba(236, 28, 36, 0.3); }

        .stat-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            background: rgba(236, 28, 36, 0.1);
            color: var(--primary);
        }

        .stat-info h3 { font-size: 24px; margin-bottom: 5px; }
        .stat-info p { font-size: 14px; color: var(--text-dim); }

        /* Main Content Area */
        .content-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 40px;
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .search-box {
            position: relative;
            flex: 1;
            max-width: 400px;
        }

        .search-box input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            padding: 12px 15px 12px 45px;
            border-radius: 12px;
            color: #fff;
            outline: none;
        }

        .search-box i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
        }

        .btn-plus {
            background: var(--primary);
            color: #fff;
            border: none;
            padding: 12px 25px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: opacity 0.2s;
        }

        .btn-plus:hover { opacity: 0.9; }

        /* License Table */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 15px;
            color: var(--text-dim);
            font-weight: 400;
            font-size: 14px;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 15px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }

        .license-key { font-family: monospace; font-weight: bold; color: var(--primary); }
        .license-id { font-size: 12px; color: var(--text-dim); }

        .status-badge {
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
        }

        .status-active { background: rgba(0, 255, 136, 0.1); color: #00ff88; }
        .status-paused { background: rgba(255, 170, 0, 0.1); color: #ffaa00; }

        .actions { display: flex; gap: 10px; }

        .action-btn {
            width: 35px;
            height: 35px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.02);
            color: var(--text-dim);
            transition: all 0.2s;
        }

        .action-btn:hover { border-color: var(--primary); color: var(--primary); }
        .btn-delete:hover { border-color: #ff4d4d; color: #ff4d4d; }

        /* Modal */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-card {
            background: #16181d;
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: 24px;
            width: 90%;
            max-width: 450px;
        }

        .modal-card h2 { margin-bottom: 20px; font-size: 24px; }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; color: var(--text-dim); font-size: 14px; }
        .input-group input, .input-group select {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: #fff;
            outline: none;
        }

        .modal-actions { display: flex; gap: 15px; margin-top: 30px; }
        .modal-actions button { flex: 1; padding: 12px; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; }
        .btn-save { background: var(--primary); color: #fff; }
        .btn-cancel { background: rgba(255,255,255,0.05); color: #fff; }

        /* Success Notification */
        #notif {
            position: fixed;
            bottom: 20px; right: 20px;
            background: var(--primary);
            padding: 15px 30px;
            border-radius: 12px;
            font-weight: bold;
            display: none;
            box-shadow: 0 10px 30px rgba(236, 28, 36, 0.4);
            z-index: 2000;
        }
    </style>
</head>
<body>
    <div class="ambient-bg"></div>

    <div class="navbar">
        <div class="logo">
            <img src="logo.png" id="navLogo">
            GODDATAX <span>PANEL</span>
        </div>
        <div style="font-size: 14px; color: var(--text-dim);">Administrator</div>
    </div>

    <div class="container">
        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-download"></i></div>
                <div class="stat-info">
                    <h3 id="statTotal">--</h3>
                    <p>Total License</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-bolt"></i></div>
                <div class="stat-info">
                    <h3 id="statActive">--</h3>
                    <p>Active Licenses</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-pause"></i></div>
                <div class="stat-info">
                    <h3 id="statPaused">--</h3>
                    <p>Paused Licenses</p>
                </div>
            </div>
        </div>

        <!-- License Management -->
        <div class="content-card">
            <div class="header-section">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Search ID (e.g. ID-1)..." oninput="filterTable()">
                </div>
                <button class="btn-plus" onclick="openCreateModal()">
                    <i class="fas fa-plus"></i> Generate License
                </button>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>LICENSE KEY</th>
                        <th>APP ID</th>
                        <th>REMAINING</th>
                        <th>STATUS</th>
                        <th style="text-align: right;">ACTIONS</th>
                    </tr>
                </thead>
                <tbody id="licenseTable">
                    <!-- Loaded dynamically -->
                    <tr><td colspan="5" style="text-align: center; color: var(--text-dim); padding: 40px;">Fetching from Supabase...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modals -->
    <div id="modalCreate" class="modal">
        <div class="modal-card">
            <h2>Manual Create License</h2>
            <div class="input-group">
                <label>License Key (Manual Copy/Paste)</label>
                <input type="text" id="newKeyName" placeholder="Contoh: GDX-VIP-12345">
            </div>
            <div class="input-group">
                <label>Duration</label>
                <select id="newKeyDuration">
                    <option value="1">1 Day (Tester)</option>
                    <option value="7">7 Days (Weekly)</option>
                    <option value="30">30 Days (Monthly)</option>
                    <option value="365">1 Year (Lifetime)</option>
                </select>
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="btn-save" onclick="generateLicense()">Save to Supabase</button>
            </div>
        </div>
    </div>

    <div id="notif">Success!</div>

    <script>
        // PASTIKAN URL DAN KEY INI BENAR (Diambil dari script.js Anda)
        const SUPABASE_URL = "https://eemjrotrcftjdazyheoc.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVlbWpyb3RyY2Z0amRhenloZW9jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMjE1NzAsImV4cCI6MjA5MDc5NzU3MH0.Uz0uOtpSYVEU88ATO8Wg_HAuGHWdWKuTObBf9D1bQwc";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let licenses = [];

        async function loadLicenses() {
            try {
                const { data, error } = await _supabase
                    .from('licenses')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                licenses = data;
                renderTable(licenses);
                updateStats();
            } catch (err) {
                alert("Gagal koneksi ke Supabase: " + err.message + "\nPastikan tabel 'licenses' memiliki kolom 'key', 'status', 'id', 'expiry_date'.");
            }
        }

        function renderTable(items) {
            const tbody = document.getElementById('licenseTable');
            tbody.innerHTML = '';

            if (items.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: var(--text-dim); padding: 40px;">Belum ada license. Klik "Generate" untuk tambah manual.</td></tr>';
                return;
            }

            items.forEach(item => {
                const tr = document.createElement('tr');
                const expiry = new Date(item.expiry_date);
                const now = new Date();
                const diffTime = expiry - now;
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                
                const status = (item.status || 'active').toLowerCase();
                const statusClass = status === 'active' ? 'status-active' : 'status-paused';

                tr.innerHTML = `
                    <td>
                        <div class="license-key">${item.key}</div>
                    </td>
                    <td>
                        <div class="license-id">#${item.id || '---'}</div>
                    </td>
                    <td>${diffDays > 0 ? diffDays + ' Days' : 'Expired'}</td>
                    <td>
                        <span class="status-badge ${statusClass}">${status.toUpperCase()}</span>
                    </td>
                    <td class="actions" style="justify-content: flex-end;">
                        <div class="action-btn" onclick="togglePause('${item.key}', '${status}')" title="${status === 'active' ? 'Pause' : 'Resume'}">
                            <i class="fas fa-${status === 'active' ? 'pause' : 'play'}"></i>
                        </div>
                        <div class="action-btn btn-delete" onclick="deleteLicense('${item.key}')" title="Delete">
                            <i class="fas fa-trash"></i>
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function togglePause(key, currentStatus) {
            const newStatus = currentStatus === 'active' ? 'paused' : 'active';
            const { error } = await _supabase
                .from('licenses')
                .update({ status: newStatus })
                .eq('key', key);

            if (!error) {
                showNotif(`License ${newStatus === 'paused' ? 'Paused' : 'Activated'}`);
                loadLicenses();
            } else {
                alert("Gagal update: " + error.message);
            }
        }

        async function deleteLicense(key) {
            if(!confirm('Hapus license ' + key + '? Pengguna akan langsung keluar aplikasi.')) return;
            const { error } = await _supabase
                .from('licenses')
                .delete()
                .eq('key', key);

            if (!error) {
                showNotif('License Deleted');
                loadLicenses();
            } else {
                alert("Gagal hapus: " + error.message);
            }
        }

        function filterTable() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const filtered = licenses.filter(l => 
                l.key.toLowerCase().includes(q) || 
                (`id-${l.id}`).toLowerCase().includes(q)
            );
            renderTable(filtered);
        }

        async function generateLicense() {
            const name = document.getElementById('newKeyName').value.trim();
            if (!name) { alert("Masukkan License Key secara manual!"); return; }
            
            const days = parseInt(document.getElementById('newKeyDuration').value);
            const expiry = new Date();
            expiry.setDate(expiry.getDate() + days);

            const { error } = await _supabase
                .from('licenses')
                .insert([{ 
                    key: name, 
                    expiry_date: expiry.toISOString(),
                    status: 'active'
                }]);

            if (!error) {
                showNotif('License Berhasil Ditambahkan!');
                document.getElementById('newKeyName').value = '';
                closeModal();
                loadLicenses();
            } else {
                alert("Gagal simpan ke Supabase: " + error.message);
            }
        }

        function updateStats() {
            document.getElementById('statTotal').textContent = licenses.length;
            document.getElementById('statActive').textContent = licenses.filter(l => (l.status || 'active') === 'active').length;
            document.getElementById('statPaused').textContent = licenses.filter(l => l.status === 'paused').length;
        }

        function openCreateModal() { document.getElementById('modalCreate').style.display = 'flex'; }
        function closeModal() { document.getElementById('modalCreate').style.display = 'none'; }
        
        function showNotif(msg) {
            const n = document.getElementById('notif');
            n.textContent = msg;
            n.style.display = 'block';
            setTimeout(() => n.style.display = 'none', 3000);
        }

        // Initialize
        loadLicenses();
        // Dynamic Logo
        document.getElementById('navLogo').src = "logo.png";
    </script>
</body>
</html>
